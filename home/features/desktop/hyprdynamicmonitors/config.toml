# ~/.config/hyprdynamicmonitors/config.toml

[general]
destination = "$HOME/.config/hypr/monitors.conf"
debounce_time_ms = 500
post_apply_exec = "hyprctl reload"

[scoring]
name_match = 10
description_match = 5
power_state_match = 3
lid_state_match = 2

[power_events]
[power_events.dbus_query_object]
path = "/org/freedesktop/UPower/devices/line_power_AC"

[[power_events.dbus_signal_match_rules]]
object_path = "/org/freedesktop/UPower/devices/line_power_AC"

[lid_events]
[lid_events.dbus_query_object]
path = "/org/freedesktop/UPower"

[[lid_events.dbus_signal_match_rules]]
object_path = "/org/freedesktop/UPower"

# --- Profile: Lid Open, No External Monitor ---
[profiles.laptop_only]
config_file = "hyprconfigs/laptop-only.conf"
config_file_type = "static"

[[profiles.laptop_only.conditions.required_monitors]]
name = "eDP-1"

# --- Profile: Lid Open, External Monitor Attached ---
[profiles.dual_monitor]
config_file = "hyprconfigs/dual-monitor.conf"
config_file_type = "static"

[[profiles.dual_monitor.conditions.required_monitors]]
name = "eDP-1"

[[profiles.dual_monitor.conditions.required_monitors]]
name = "DP-1"

# --- Profile: Lid Closed, External Monitor Attached (Clamshell) ---
[profiles.clamshell]
config_file = "hyprconfigs/clamshell.conf"
config_file_type = "static"

[[profiles.clamshell.conditions.required_monitors]]
name = "DP-1"
