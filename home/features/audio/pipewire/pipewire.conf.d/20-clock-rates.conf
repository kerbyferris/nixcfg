# Allow the PipeWire graph to run at 44.1 kHz so fixed-rate devices
# (e.g. the Roland TR-09 / "Boutique", card 0) operate at their native
# rate without in-graph resampling (which caused ringing/artifacts).
# The graph auto-retunes to the active device's rate.
context.properties = {
    default.clock.allowed-rates = [ 44100 48000 ]
}
